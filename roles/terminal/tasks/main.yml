---
- name: Determine user home directory safely
  ansible.builtin.set_fact:
    terminal_current_home: "{{ ansible_user_dir }}"

- name: Clone Oh My Zsh
  ansible.builtin.git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git # noqa: latest[git]
    dest: "{{ terminal_current_home }}/.oh-my-zsh"
    depth: 1
    update: false
  become: false

- name: Ensure custom plugins directory exists
  ansible.builtin.file:
    path: "{{ terminal_current_home }}/.oh-my-zsh/custom/plugins"
    state: directory
    mode: '0755'
  become: false

- name: Clone zsh-syntax-highlighting plugin # noqa: latest[git]
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: "{{ terminal_current_home }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    depth: 1
    update: false
  become: false

- name: Clone zsh-autosuggestions plugin # noqa: latest[git]
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    dest: "{{ terminal_current_home }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    depth: 1
    update: false
  become: false

- name: Deploy .zshrc template
  ansible.builtin.template:
    src: "{{ playbook_dir }}/dotfiles/.zshrc.j2"
    dest: "{{ terminal_current_home }}/.zshrc"
    backup: true
    mode: '0644'
  become: false

- name: Find zsh executable dynamically
  ansible.builtin.command: which zsh
  register: terminal_zsh_path
  changed_when: false
  become: false

- name: Set zsh as the default shell (Linux)
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    shell: "{{ terminal_zsh_path.stdout }}"
  become: true
  when: ansible_os_family != 'Darwin'

- name: Set zsh as the default shell (macOS)
  ansible.builtin.command: "chsh -s {{ terminal_zsh_path.stdout }} {{ ansible_user_id }}"
  become: true
  when: ansible_os_family == 'Darwin'
  changed_when: false
